services:
  - type: web
    name: xtgzpt
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && VITE_API_BASE_URL= npm run build
    startCommand: npm run start:dist -w @xtgzpt/api
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.14.1
      - key: HOST
        value: 0.0.0.0
      - key: XTGZPT_SERVE_WEB
        value: "true"
      - key: XTGZPT_RUNTIME_STORE_MODE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: xtgzpt-db
          property: connectionString

databases:
  - name: xtgzpt-db
    plan: free
    region: frankfurt
    databaseName: xtgzpt
    user: xtgzpt
