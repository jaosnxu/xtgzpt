name: Loop DEV 阶段
description: 创建一个可执行的开发阶段，必须有范围、验收和验证门禁。
title: "[DEV-000] "
labels:
  - dev
  - loop
body:
  - type: textarea
    id: goal
    attributes:
      label: 阶段目标
      description: 本阶段完成后，系统新增什么真实能力。
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 本阶段范围
      description: 必须做什么，涉及哪些页面、接口、数据和权限。
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: 明确不做
      description: 防止范围扩散，列出本阶段不做的内容。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 必须真实跑通的闭环、状态、权限、审计和页面行为。
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: 验证命令
      description: 至少包含 npm run ci、npm run smoke、必要的浏览器或 API 矩阵。
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: 已知风险
      description: 技术风险、产品风险、外部依赖和平台缺口。
    validations:
      required: false
